<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#020617;
font-family:monospace;
color:#21d4d9;
}

/* основной таймер */
.timer{
font-size:clamp(32px, 12vw, 64px);
letter-spacing:2px;
text-shadow:
0 0 4px rgba(0,255,255,0.6),
0 0 8px rgba(0,255,255,0.4);
transition:all 0.2s;
}

/* подписи */
.labels{
display:flex;
gap:clamp(18px,6vw,40px);
margin-top:8px;
font-size:12px;
opacity:0.7;
color:#ccc;
}

</style>

</head>

<body>

<div class="timer" id="timer">
00:00:00:00
</div>

<div class="labels">
<span>Д</span>
<span>Ч</span>
<span>М</span>
<span>С</span>
</div>

<script>

const target = new Date("2026-04-30T19:00:00")

function pad(num){
return String(num).padStart(2,'0')
}

function update(){

const now = new Date()
const diff = target - now

if(diff <= 0){
document.getElementById("timer").innerText = "00:00:00:00"
return
}

const days = Math.floor(diff / (1000*60*60*24))
const hours = Math.floor(diff / (1000*60*60) % 24)
const minutes = Math.floor(diff / (1000*60) % 60)
const seconds = Math.floor(diff / 1000 % 60)

document.getElementById("timer").innerText =
days + ":" + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds)

}

setInterval(update,1000)

update()

</script>

</body>
</html>
