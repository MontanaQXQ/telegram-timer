<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* контейнер таймера */

.timer{
font-size:clamp(40px,12vw,70px);
font-weight:bold;
display:flex;
gap:clamp(10px,4vw,20px);
color:#22d3ee;

/* мягкий неон */
text-shadow:
0 0 3px rgba(34,211,238,0.7),
0 0 8px rgba(34,211,238,0.4),
0 0 16px rgba(34,211,238,0.2);
}

.block{
text-align:center;
}

.label{
font-size:12px;
opacity:0.7;
margin-top:4px;
}

</style>

</head>

<body>

<div class="timer">

<div class="block">
<div id="days">0</div>
<div class="label">Д</div>
</div>

<div class="block">
<div id="hours">0</div>
<div class="label">Ч</div>
</div>

<div class="block">
<div id="minutes">0</div>
<div class="label">М</div>
</div>

<div class="block">
<div id="seconds">0</div>
<div class="label">С</div>
</div>

</div>

<script>

const target = new Date("2026-04-30T19:00:00")

function update(){

const now = new Date()
const diff = target - now

if(diff <= 0){
document.body.innerHTML="<h1>Время!</h1>"
return
}

const days = Math.floor(diff / (1000*60*60*24))
const hours = Math.floor(diff / (1000*60*60) % 24)
const minutes = Math.floor(diff / (1000*60) % 60)
const seconds = Math.floor(diff / 1000 % 60)

document.getElementById("days").innerText = days
document.getElementById("hours").innerText = hours
document.getElementById("minutes").innerText = minutes
document.getElementById("seconds").innerText = seconds

}

setInterval(update,1000)

update()

</script>

</body>
</html>
