<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#020617;
font-family:monospace;
color:#24e6ea;
overflow:hidden;
}

/* контейнер таймера */
.timer{
display:flex;
justify-content:center;
align-items:center;
width:100%;
font-size:clamp(28px,10vw,52px);
text-shadow:
0 0 3px rgba(0,255,255,0.6),
0 0 6px rgba(0,255,255,0.3);
}

/* подписи */
.labels{
display:grid;
grid-template-columns:repeat(4,1fr);
width:80%;
max-width:400px;
margin-top:8px;
text-align:center;
font-size:11px;
opacity:0.7;
color:#bbb;
}

</style>

</head>

<body>

<div class="timer" id="timer">
00:00:00:00
</div>

<div class="labels">
<div>Д</div>
<div>Ч</div>
<div>М</div>
<div>С</div>
</div>

<script>

const target = new Date("2026-04-30T19:00:00")

function pad(num){
return String(num).padStart(2,'0')
}

function update(){

const now = new Date()
const diff = target - now

if(diff <= 0){
document.getElementById("timer").innerText = "00:00:00:00"
return
}

const days = Math.floor(diff / (1000*60*60*24))
const hours = Math.floor(diff / (1000*60*60) % 24)
const minutes = Math.floor(diff / (1000*60) % 60)
const seconds = Math.floor(diff / 1000 % 60)

document.getElementById("timer").innerText =
days + ":" + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds)

}

setInterval(update,1000)

update()

</script>

</body>
</html>
