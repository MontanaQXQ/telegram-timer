<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#010409;
font-family:monospace;
color:#00f7ff;
}

.timer{
font-size:80px;
letter-spacing:6px;
text-shadow:
0 0 5px #00f7ff,
0 0 10px #00f7ff,
0 0 20px #00f7ff;
transition:all 0.2s;
}

.labels{
display:flex;
gap:60px;
margin-top:10px;
font-size:14px;
opacity:0.7;
color:white;
}

</style>

</head>

<body>

<div class="timer" id="timer">
00:00:00:00
</div>

<div class="labels">
<span>Д</span>
<span>Ч</span>
<span>М</span>
<span>С</span>
</div>

<script>

const target = new Date("2026-04-30T19:00:00")

function pad(num){
return String(num).padStart(2,'0')
}

function update(){

const now = new Date()
const diff = target - now

if(diff <= 0){
document.getElementById("timer").innerText = "00:00:00:00"
return
}

const days = Math.floor(diff / (1000*60*60*24))
const hours = Math.floor(diff / (1000*60*60) % 24)
const minutes = Math.floor(diff / (1000*60) % 60)
const seconds = Math.floor(diff / 1000 % 60)

document.getElementById("timer").innerText =
days + ":" + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds)

}

setInterval(update,1000)

update()

</script>

</body>
</html>
