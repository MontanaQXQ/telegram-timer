<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.timer{
display:flex;
align-items:center;
font-size:60px;
font-weight:700;
}

.block{
text-align:center;
width:70px;
}

.label{
font-size:12px;
opacity:0.6;
margin-top:5px;
}

.separator{
margin:0 10px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="timer">

<div class="block">
<div id="days">0</div>
<div class="label">Д</div>
</div>

<div class="separator">:</div>

<div class="block">
<div id="hours">0</div>
<div class="label">Ч</div>
</div>

<div class="separator">:</div>

<div class="block">
<div id="minutes">0</div>
<div class="label">М</div>
</div>

<div class="separator">:</div>

<div class="block">
<div id="seconds">0</div>
<div class="label">С</div>
</div>

</div>

<script>

const target = new Date("2026-04-30T19:00:00")

function update(){

const now = new Date()

const diff = target - now

if(diff <= 0){
document.body.innerHTML="<h1>ВРЕМЯ!</h1>"
return
}

const days = Math.floor(diff / (1000*60*60*24))
const hours = Math.floor(diff / (1000*60*60) % 24)
const minutes = Math.floor(diff / (1000*60) % 60)
const seconds = Math.floor(diff / 1000 % 60)

document.getElementById("days").innerText = days
document.getElementById("hours").innerText = hours
document.getElementById("minutes").innerText = minutes
document.getElementById("seconds").innerText = seconds

}

setInterval(update,1000)

update()

</script>

</body>
</html>
